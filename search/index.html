<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입주가능업종 검색 | 국가산업단지 인허가 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --primary: #1a3a6e;
  --primary-light: #2d5299;
  --accent: #e8f0fe;
  --ok: #1e6b3e;
  --ok-bg: #e6f4ec;
  --ok-border: #7bc99a;
  --warn: #7a4a00;
  --warn-bg: #fff8e6;
  --warn-border: #f0c040;
  --no: #8b1a1a;
  --no-bg: #fdeaea;
  --no-border: #e88080;
  --text: #1a1f2e;
  --muted: #6b7280;
  --border: #dde3ed;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(26,58,110,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* 헤더 */
.header {
  background: var(--primary);
  color: #fff;
  padding: 28px 0 24px;
  text-align: center;
}
.header h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-size: 0.82rem; opacity: 0.75; margin-top: 6px; }

/* 검색 박스 */
.search-wrap {
  max-width: 720px;
  margin: 28px auto 0;
  padding: 0 16px;
}
.search-box {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 20px 16px;
}
.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.search-input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 1rem;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--primary-light); }
.search-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 22px;
  font-size: 0.95rem;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.search-btn:hover { background: var(--primary-light); }
.search-hint {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 10px;
  display: flex;
  gap: 14px;
}
.search-hint span::before { content: "• "; }

/* 통계 바 */
.stats-bar {
  max-width: 720px;
  margin: 14px auto 0;
  padding: 0 16px;
  display: flex;
  gap: 10px;
}
.stat-pill {
  flex: 1;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.82rem;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.stat-pill.all   { background:#eef2ff; color: var(--primary); border-color:#c7d4f0; }
.stat-pill.ok    { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-border); }
.stat-pill.warn  { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border); }
.stat-pill.no    { background: var(--no-bg); color: var(--no); border-color: var(--no-border); }
.stat-pill.active, .stat-pill:hover { filter: brightness(0.93); }
.stat-count { font-size: 1.1rem; font-weight: 700; display: block; }

/* 결과 영역 */
.results-wrap {
  max-width: 720px;
  margin: 18px auto 40px;
  padding: 0 16px;
}
.results-header {
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 2px;
}
.result-count { color: var(--primary); font-weight: 600; }

/* 카드 */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  border-left: 4px solid transparent;
  overflow: hidden;
  cursor: pointer;
}
.card.ok   { border-left-color: var(--ok-border); }
.card.warn { border-left-color: var(--warn-border); }
.card.no   { border-left-color: var(--no-border); }

.card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
}
.badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge.ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok-border); }
.badge.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
.badge.no   { background: var(--no-bg);   color: var(--no);   border: 1px solid var(--no-border); }

.card-code {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
  background: #f3f4f6;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  font-family: monospace;
}
.card-name {
  font-size: 0.97rem;
  font-weight: 500;
  flex: 1;
}
.card-type {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
}
.expand-icon {
  font-size: 0.8rem;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.expanded .expand-icon { transform: rotate(180deg); }

.card-detail {
  display: none;
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  font-size: 0.85rem;
  line-height: 1.7;
}
.card.expanded .card-detail { display: block; }

.detail-row { display: flex; gap: 8px; margin-bottom: 5px; }
.detail-label {
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
  min-width: 54px;
}
.detail-val { color: var(--text); }
.detail-val.warn-txt { color: var(--warn); font-weight: 500; }
.detail-val.no-txt   { color: var(--no);   font-weight: 500; }

/* 매칭된 활동 힌트 (카드 헤더 바로 아래에 노출) */
.matched-hint {
  font-size: 0.78rem;
  color: var(--ok);
  background: linear-gradient(90deg, var(--ok-bg) 0%, transparent 100%);
  padding: 5px 16px 5px 16px;
  border-top: 1px dashed var(--ok-border);
  line-height: 1.5;
}
.matched-hint strong { color: var(--text); }

/* 생산품/활동 키워드 태그 */
.ex-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.ex-tag {
  display: inline-block;
  font-size: 0.75rem;
  background: var(--accent);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 99px;
  border: 1px solid #c7d6ee;
  line-height: 1.5;
}
.ex-more {
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: 2px;
}

/* 중분류 구분선 */
.mid-divider {
  font-size: 0.75rem;
  color: var(--muted);
  padding: 8px 4px 4px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mid-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* 빈 결과 */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty h3 { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
.empty p { font-size: 0.85rem; }

/* 면책 배너 */
.disclaimer {
  background: #fffbeb;
  border: 1px solid #f0c040;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: #7a4a00;
  margin-bottom: 14px;
}

/* 로딩 상태 */
.loading { text-align:center; padding:40px; color:var(--muted); font-size:0.9rem; }

/* 산단 선택 */
.danji-wrap {
  max-width: 720px;
  margin: 28px auto 0;
  padding: 0 16px;
}
.danji-label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 2px;
}
.danji-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.danji-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.danji-btn:hover:not(.disabled) {
  border-color: var(--primary-light);
  box-shadow: 0 4px 16px rgba(26,58,110,0.12);
  transform: translateY(-1px);
}
.danji-btn.active {
  border-color: var(--primary);
  background: var(--accent);
  box-shadow: 0 4px 16px rgba(26,58,110,0.14);
}
.danji-btn.disabled {
  opacity: 0.45;
  cursor: not-allowed;
  background: #f9fafb;
}
.danji-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  display: block;
  line-height: 1.3;
}
.danji-btn.active .danji-name { color: var(--primary); }
.danji-sub {
  font-size: 0.73rem;
  color: var(--muted);
  display: block;
}
.danji-btn.active .danji-sub { color: var(--primary-light); }
.danji-selected-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: var(--primary);
  border: 1px solid #c7d4f0;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 10px;
}


/* 관리기본계획 링크 */
.doc-links {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.doc-links-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
}
.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.8rem;
  color: var(--primary-light);
  text-decoration: none;
  font-weight: 500;
  padding: 4px 10px;
  border: 1px solid #c7d4f0;
  border-radius: 6px;
  background: var(--accent);
  transition: all 0.15s;
}
.doc-link:hover {
  background: #dbe8ff;
  border-color: var(--primary);
  color: var(--primary);
}
/* 상단 네비게이션 바 */
.top-nav {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.top-nav-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  transition: background 0.15s;
}
.back-link:hover {
  background: var(--accent);
}
.top-nav-title {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
}

</style>
</head>
<body>

<div class="top-nav">
  <div class="top-nav-inner">
    <a href="../" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      메인으로 돌아가기
    </a>
    <span class="top-nav-title">국가산업단지 인허가 안내</span>
  </div>
</div>

<div class="header">
  <h1>산업단지 입주가능업종 검색</h1>
  <p>산업단지를 선택하고 업종을 검색하세요 · KSIC 11차 기준</p>
</div>


<div class="danji-wrap">
  <div class="danji-label">산업단지 선택</div>
  <div class="danji-list">
    <button class="danji-btn active" id="btn-namdong" onclick="selectDangi('namdong', this)">
      <span class="danji-name">남동국가산업단지</span>
      <span class="danji-sub">인천광역시 남동구</span>
    </button>
    <button class="danji-btn disabled" disabled title="준비 중">
      <span class="danji-name">녹산국가산업단지</span>
      <span class="danji-sub">준비 중</span>
    </button>
    <button class="danji-btn disabled" disabled title="준비 중">
      <span class="danji-name">반월·시화산업단지</span>
      <span class="danji-sub">준비 중</span>
    </button>
    <button class="danji-btn disabled" disabled title="준비 중">
      <span class="danji-name">그 외 산단</span>
      <span class="danji-sub">준비 중</span>
    </button>
  </div>
</div>

<div class="search-wrap" id="search-section" style="display:none">
  <div class="search-box">
    <div class="search-row">
      <input class="search-input" id="q" type="text"
             placeholder="예) 사출성형기, 자동차 부품, 화장품, 29291..."
             autocomplete="off" autofocus>
      <button class="search-btn" onclick="doSearch()">검색</button>
    </div>
    <div class="search-hint">
      <span>생산품·공정명으로 검색</span>
      <span>업종명·중분류명 입력</span>
      <span>5자리 코드 직접 입력</span>
    </div>
  </div>
  <div class="doc-links">
    <span class="doc-links-label">관리기본계획 원문</span>
    <a class="doc-link" href="https://www.factoryon.go.kr/irsttguide/irsttList.do" target="_blank">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      관리기본계획 보러가기 (팩토리온)
    </a>
  </div>
</div>

<div class="stats-bar" style="display:none">
  <div class="stat-pill all active" id="pill-all" onclick="filterStatus('all')">
    <span class="stat-count" id="cnt-all">565</span>전체
  </div>
  <div class="stat-pill ok" id="pill-ok" onclick="filterStatus('ok')">
    <span class="stat-count" id="cnt-ok">502</span>입주 가능
  </div>
  <div class="stat-pill warn" id="pill-warn" onclick="filterStatus('warn')">
    <span class="stat-count" id="cnt-warn">12</span>조건부
  </div>
  <div class="stat-pill no" id="pill-no" onclick="filterStatus('no')">
    <span class="stat-count" id="cnt-no">51</span>입주 불가
  </div>
</div>

<div class="results-wrap" style="display:none">
  <div class="disclaimer">
    ※ 본 검색 결과는 <strong>참고용</strong>이며, 최종 입주 가능 여부는 담당자 확인 필수입니다.
    사업계획서 내용, 실제 생산품 등에 따라 달라질 수 있습니다.
  </div>
  <div class="results-header" id="results-header">
    전체 <span class="result-count" id="result-count">565</span>개 업종
  </div>
  <div id="results-list"></div>

  // 다중 공백 → 단일 공백
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}

// 공백·특수문자 무시 정규화 (매칭 비교용)
function normalizeForMatch(s) {
  return (s || '').replace(/[\s·ㆍ,()\[\]\.]+/g, '').toLowerCase();
}

// 검색어에서 의미있는 토큰들을 추출
// - 공백 단위 단어 (2글자 이상, 공백 제거)
// - 공백 무시 전체
// - 4글자 이상이면 2~4글자 부분 문자열 (n-gram) — 한국어 형태소 매칭 보완
function extractTokens(q) {
  const norm = normalizeQuery(q);
  const tokens = new Set();
  // 1) 공백 단위 단어
  norm.split(/\s+/).forEach(w => {
    const ws = normalizeForMatch(w);
    if (ws.length >= 2) tokens.add(ws);
  });
  // 2) 공백 무시 전체
  const noSp = normalizeForMatch(norm);
  if (noSp.length >= 2) tokens.add(noSp);
  // 3) n-gram (전체 검색어가 4글자 이상일 때만 — 노이즈 방지)
  if (noSp.length >= 4) {
    for (let n = 2; n <= Math.min(4, noSp.length - 1); n++) {
      for (let i = 0; i + n <= noSp.length; i++) {
        tokens.add(noSp.substring(i, i + n));
      }
    }
  }
  return [...tokens];
}

function score(item, q) {
  if (!q) return 1;
  const t = q.trim();
  if (!t) return 1;
  const tNorm = normalizeForMatch(t);

  // ━━ 1순위: 코드 매칭 (가장 정확) ━━
  if (item.code === t) return 1000;
  if (item.code.startsWith(t)) return 900;

  // ━━ 2순위: 업종명/중분류명 매칭 (공백 무시) ━━
  if (normalizeForMatch(item.name).includes(tNorm)) return 800;
  if (normalizeForMatch(item.midNm).includes(tNorm)) return 600;

  // ━━ 3순위: 생산품·공정 키워드 매칭 ━━
  const tokens = extractTokens(t);
  const examples = KEYWORDS[item.code] || [];
  let exScore = 0;
  let matchedExample = '';

  // 3-1) 검색어 원문 그대로 examples 매칭 (가장 정확)
  for (const ex of examples) {
    if (normalizeForMatch(ex).includes(tNorm)) {
      if (500 > exScore) {
        exScore = 500;
        matchedExample = ex;
      }
    }
  }

  // 3-2) 토큰별 매칭 — 업종명 직접 매칭이 예시 매칭보다 강력
  let nameTokenMatches = 0;
  for (const tok of tokens) {
    if (tok === tNorm) continue;
    const tokLen = tok.length;

    // 업종명에 토큰이 직접 포함되면 (강한 매칭 - 우선순위 ↑)
    if (normalizeForMatch(item.name).includes(tok)) {
      const nameSc = tokLen >= 4 ? 460 : (tokLen >= 3 ? 420 : 350);
      if (nameSc > exScore) {
        exScore = nameSc;
        matchedExample = ''; // 업종명 매칭이면 예시 표시 안 함
      }
      nameTokenMatches++;
    }

    // 예시(생산품/공정)에 토큰 매칭 (보조 신호)
    const exSc = tokLen >= 4 ? 380 : (tokLen >= 3 ? 320 : 180);
    for (const ex of examples) {
      if (normalizeForMatch(ex).includes(tok)) {
        if (exSc > exScore) {
          exScore = exSc;
          matchedExample = ex;
        }
      }
    }

    // 중분류명에 토큰이 포함되면 (매우 약한 매칭)
    if (normalizeForMatch(item.midNm).includes(tok)) {
      const midSc = tokLen >= 3 ? 220 : 130;
      exScore = Math.max(exScore, midSc);
    }
  }

  // 보너스: 검색어의 토큰 여러 개가 모두 업종명에 매칭되면 가산점
  // 예: "자동차 부품" → '자동차' + '부품' 둘 다 업종명에 → +60
  if (nameTokenMatches >= 2) {
    exScore += Math.min(80, nameTokenMatches * 30);
  }

  if (exScore > 0) {
    item._matched = matchedExample;
    return exScore;
  }

  // ━━ 4순위: 근거/타입 매칭 (약함) ━━
  if (item.basis.includes(t) || item.type.includes(t)) return 50;

  return 0;
}

function getFiltered(query, filter) {
  return RAW
    .map(item => ({ item, sc: score(item, query) }))
    .filter(({ item, sc }) => {
      if (sc === 0 && query.trim()) return false;
      if (filter === 'ok'   && !item.status.includes('✅')) return false;
      if (filter === 'warn' && !item.status.includes('⚠️')) return false;
      if (filter === 'no'   && !item.status.includes('❌')) return false;
      return true;
    })
    .sort((a, b) => b.sc - a.sc || a.item.code.localeCompare(b.item.code))
    .map(x => x.item);
}

function highlight(text, q) {
  if (!q || !q.trim()) return text;
  const t = q.trim();
  const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:#fef08a;border-radius:2px;padding:0 1px">$1</mark>');
}

function renderCard(item, q) {
  const cls = statusClass(item.status);
  const lbl = statusLabel(item.status);
  const nameHl = highlight(item.name, q);
  const midHl  = highlight(item.midNm, q);

  let detailWarn = '';
  if (cls === 'warn') detailWarn = `<div class="detail-row"><span class="detail-label">주의사항</span><span class="detail-val warn-txt">${item.note || '환경인허가기관 사전협의 필수'}</span></div>`;
  if (cls === 'no')   detailWarn = `<div class="detail-row"><span class="detail-label">사유</span><span class="detail-val no-txt">${item.basis}</span></div>`;

  // 매칭된 키워드 (검색어가 examples에 매칭된 경우)
  let matchedHint = '';
  if (item._matched && q && q.trim()) {
    matchedHint = `<div class="matched-hint">💡 매칭된 활동: <strong>${highlight(item._matched, q)}</strong></div>`;
  }

  // 해당 업종의 대표 생산품/활동 (펼침 영역에 표시)
  const exList = (typeof KEYWORDS !== 'undefined' && KEYWORDS[item.code]) ? KEYWORDS[item.code] : [];
  let examplesHtml = '';
  if (exList.length > 0) {
    const shown = exList.slice(0, 6);
    examplesHtml = `<div class="detail-row"><span class="detail-label">생산품/활동 예시</span><span class="detail-val ex-list">${shown.map(e => `<span class="ex-tag">${highlight(e, q)}</span>`).join('')}${exList.length > 6 ? `<span class="ex-more">+${exList.length - 6}개</span>` : ''}</span></div>`;
  }

  return `<div class="card ${cls}" onclick="toggleCard(this)">
  <div class="card-head">
    <span class="badge ${cls}">${lbl}</span>
    <span class="card-code">${item.code}</span>
    <span class="card-name">${nameHl}</span>
    <span class="card-type">${item.type}</span>
    <span class="expand-icon">▼</span>
  </div>
  ${matchedHint}
  <div class="card-detail">
    <div class="detail-row"><span class="detail-label">중분류</span><span class="detail-val">${midHl} (${item.mid})</span></div>
    <div class="detail-row"><span class="detail-label">근거</span><span class="detail-val">${item.basis || '-'}</span></div>
    ${examplesHtml}
    ${detailWarn}
  </div>
</div>`;
}

function render(items, q) {
  const list = document.getElementById('results-list');
  if (items.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>검색 결과가 없어요</h3><p>"${q}"에 해당하는 업종을 찾을 수 없습니다.<br>코드 5자리 또는 업종명 일부를 다시 입력해보세요.</p></div>`;
    return;
  }

  // 중분류별 그룹화
  const groups = {};
  items.forEach(item => {
    const key = `${item.mid}|${item.midNm}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  let html = '';
  Object.entries(groups).forEach(([key, grpItems]) => {
    const [mid, midNm] = key.split('|');
    html += `<div class="mid-divider">${midNm} (${mid}) · ${grpItems.length}개</div>`;
    grpItems.forEach(item => { html += renderCard(item, q); });
  });
  list.innerHTML = html;
}

function updateStats(query) {
  ['ok','warn','no','all'].forEach(f => {
    const items = getFiltered(query, f === 'all' ? 'all' : f);
    // 필터별 카운트
    const all = getFiltered(query, 'all');
    document.getElementById('cnt-all').textContent  = all.length;
    document.getElementById('cnt-ok').textContent   = getFiltered(query, 'ok').length;
    document.getElementById('cnt-warn').textContent = getFiltered(query, 'warn').length;
    document.getElementById('cnt-no').textContent   = getFiltered(query, 'no').length;
  });
}

function doSearch() {
  const q = document.getElementById('q').value;
  currentQuery = q;
  currentResults = getFiltered(q, currentFilter);

  updateStats(q);
  document.getElementById('result-count').textContent = currentResults.length;
  document.getElementById('results-header').innerHTML =
    `${q ? `"<strong>${q}</strong>" 검색 결과 ` : '전체 '}<span class="result-count" id="result-count">${currentResults.length}</span>개 업종`;

  render(currentResults, q);
}

function filterStatus(f) {
  currentFilter = f;
  ['all','ok','warn','no'].forEach(x => {
    document.getElementById('pill-'+x).classList.toggle('active', x === f);
  });
  currentResults = getFiltered(currentQuery, f);
  document.getElementById('results-header').innerHTML =
    `${currentQuery ? `"<strong>${currentQuery}</strong>" ` : ''}검색 결과 <span class="result-count">${currentResults.length}</span>개 업종`;
  render(currentResults, currentQuery);
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

// 엔터키
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});


function selectDangi(id, btn) {
  // 선택 상태 업데이트
  document.querySelectorAll('.danji-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // 검색 섹션 표시
  const sec = document.getElementById('search-section');
  sec.style.display = 'block';
  sec.style.opacity = '0';
  sec.style.transform = 'translateY(8px)';
  setTimeout(() => {
    sec.style.transition = 'opacity 0.25s, transform 0.25s';
    sec.style.opacity = '1';
    sec.style.transform = 'translateY(0)';
  }, 10);

  // 통계/결과도 표시
  document.querySelector('.stats-bar').style.display = 'flex';
  document.querySelector('.results-wrap').style.display = 'block';

  // 검색창 힌트 업데이트 + 포커스
  const danjiNames = { namdong: '남동국가산업단지' };
  document.getElementById('q').placeholder = `예) 26110  또는  전자부품  또는  기계장비`;
  document.getElementById('q').focus();

  // 초기 렌더
  doSearch();
}
