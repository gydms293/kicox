<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입주가능업종 검색 | 국가산업단지 인허가 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --primary: #1a3a6e;
  --primary-light: #2d5299;
  --accent: #e8f0fe;
  --ok: #1e6b3e;
  --ok-bg: #e6f4ec;
  --ok-border: #7bc99a;
  --warn: #7a4a00;
  --warn-bg: #fff8e6;
  --warn-border: #f0c040;
  --no: #8b1a1a;
  --no-bg: #fdeaea;
  --no-border: #e88080;
  --text: #1a1f2e;
  --muted: #6b7280;
  --border: #dde3ed;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(26,58,110,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* 헤더 */
.header {
  background: var(--primary);
  color: #fff;
  padding: 28px 0 24px;
  text-align: center;
}
.header h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-size: 0.82rem; opacity: 0.75; margin-top: 6px; }

/* 검색 박스 */
.search-wrap {
  max-width: 720px;
  margin: 28px auto 0;
  padding: 0 16px;
}
.search-box {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 20px 16px;
}
.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.search-input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 1rem;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--primary-light); }
.search-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 22px;
  font-size: 0.95rem;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.search-btn:hover { background: var(--primary-light); }
.search-hint {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 10px;
  display: flex;
  gap: 14px;
}
.search-hint span::before { content: "• "; }

/* 통계 바 */
.stats-bar {
  max-width: 720px;
  margin: 14px auto 0;
  padding: 0 16px;
  display: flex;
  gap: 10px;
}
.stat-pill {
  flex: 1;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.82rem;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.stat-pill.all   { background:#eef2ff; color: var(--primary); border-color:#c7d4f0; }
.stat-pill.ok    { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-border); }
.stat-pill.warn  { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border); }
.stat-pill.no    { background: var(--no-bg); color: var(--no); border-color: var(--no-border); }
.stat-pill.active, .stat-pill:hover { filter: brightness(0.93); }
.stat-count { font-size: 1.1rem; font-weight: 700; display: block; }

/* 결과 영역 */
.results-wrap {
  max-width: 720px;
  margin: 18px auto 40px;
  padding: 0 16px;
}
.results-header {
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 2px;
}
.result-count { color: var(--primary); font-weight: 600; }

/* 카드 */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  border-left: 4px solid transparent;
  overflow: hidden;
  cursor: pointer;
}
.card.ok   { border-left-color: var(--ok-border); }
.card.warn { border-left-color: var(--warn-border); }
.card.no   { border-left-color: var(--no-border); }

.card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
}
.badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge.ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok-border); }
.badge.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
.badge.no   { background: var(--no-bg);   color: var(--no);   border: 1px solid var(--no-border); }

.card-code {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
  background: #f3f4f6;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  font-family: monospace;
}
.card-name {
  font-size: 0.97rem;
  font-weight: 500;
  flex: 1;
}
.card-type {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
}
.expand-icon {
  font-size: 0.8rem;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.expanded .expand-icon { transform: rotate(180deg); }

.card-detail {
  display: none;
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  font-size: 0.85rem;
  line-height: 1.7;
}
.card.expanded .card-detail { display: block; }

.detail-row { display: flex; gap: 8px; margin-bottom: 5px; }
.detail-label {
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
  min-width: 54px;
}
.detail-val { color: var(--text); }
.detail-val.warn-txt { color: var(--warn); font-weight: 500; }
.detail-val.no-txt   { color: var(--no);   font-weight: 500; }

/* 중분류 구분선 */
.mid-divider {
  font-size: 0.75rem;
  color: var(--muted);
  padding: 8px 4px 4px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mid-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* 빈 결과 */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty h3 { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
.empty p { font-size: 0.85rem; }

/* 면책 배너 */
.disclaimer {
  background: #fffbeb;
  border: 1px solid #f0c040;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: #7a4a00;
  margin-bottom: 14px;
}

/* 로딩 상태 */
.loading { text-align:center; padding:40px; color:var(--muted); font-size:0.9rem; }

/* 산단 선택 */
.danji-wrap {
  max-width: 720px;
  margin: 28px auto 0;
  padding: 0 16px;
}
.danji-label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 2px;
}
.danji-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.danji-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.danji-btn:hover:not(.disabled) {
  border-color: var(--primary-light);
  box-shadow: 0 4px 16px rgba(26,58,110,0.12);
  transform: translateY(-1px);
}
.danji-btn.active {
  border-color: var(--primary);
  background: var(--accent);
  box-shadow: 0 4px 16px rgba(26,58,110,0.14);
}
.danji-btn.disabled {
  opacity: 0.45;
  cursor: not-allowed;
  background: #f9fafb;
}
.danji-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  display: block;
  line-height: 1.3;
}
.danji-btn.active .danji-name { color: var(--primary); }
.danji-sub {
  font-size: 0.73rem;
  color: var(--muted);
  display: block;
}
.danji-btn.active .danji-sub { color: var(--primary-light); }
.danji-selected-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: var(--primary);
  border: 1px solid #c7d4f0;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 10px;
}


/* 관리기본계획 링크 */
.doc-links {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.doc-links-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
}
.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.8rem;
  color: var(--primary-light);
  text-decoration: none;
  font-weight: 500;
  padding: 4px 10px;
  border: 1px solid #c7d4f0;
  border-radius: 6px;
  background: var(--accent);
  transition: all 0.15s;
}
.doc-link:hover {
  background: #dbe8ff;
  border-color: var(--primary);
  color: var(--primary);
}
/* 상단 네비게이션 바 */
.top-nav {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.top-nav-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  transition: background 0.15s;
}
.back-link:hover {
  background: var(--accent);
}
.top-nav-title {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
}

</style>
</head>

  </div>
  <div id="results-list"></div>
</div>

let currentFilter = 'all';
let currentQuery  = '';
let currentResults = [];

function statusClass(s) {
  if (s.includes('✅')) return 'ok';
  if (s.includes('⚠️')) return 'warn';
  return 'no';
}
function statusLabel(s) {
  if (s.includes('✅')) return '입주 가능';
  if (s.includes('⚠️')) return '조건부 가능';
  return '입주 불가';
}

function score(item, q) {
  if (!q) return 1;
  const t = q.trim();
  if (!t) return 1;
  // 코드 완전일치
  if (item.code === t) return 100;
  // 코드 시작
  if (item.code.startsWith(t)) return 90;
  // 전체 문자열 그대로 업종명 포함 (공백 포함 한 단어로 취급)
  if (item.name.includes(t)) return 80;
  // 전체 문자열 그대로 중분류명 포함
  if (item.midNm.includes(t)) return 60;
  // 전체 문자열 그대로 근거/업종구분 포함
  if (item.basis.includes(t) || item.type.includes(t)) return 30;
  return 0;
}

function getFiltered(query, filter) {
  return RAW
    .map(item => ({ item, sc: score(item, query) }))
    .filter(({ item, sc }) => {
      if (sc === 0 && query.trim()) return false;
      if (filter === 'ok'   && !item.status.includes('✅')) return false;
      if (filter === 'warn' && !item.status.includes('⚠️')) return false;
      if (filter === 'no'   && !item.status.includes('❌')) return false;
      return true;
    })
    .sort((a, b) => b.sc - a.sc || a.item.code.localeCompare(b.item.code))
    .map(x => x.item);
}

function highlight(text, q) {
  if (!q || !q.trim()) return text;
  const t = q.trim();
  const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:#fef08a;border-radius:2px;padding:0 1px">$1</mark>');
}

function renderCard(item, q) {
  const cls = statusClass(item.status);
  const lbl = statusLabel(item.status);
  const nameHl = highlight(item.name, q);
  const midHl  = highlight(item.midNm, q);

  let detailWarn = '';
  if (cls === 'warn') detailWarn = `<div class="detail-row"><span class="detail-label">주의사항</span><span class="detail-val warn-txt">${item.note || '환경인허가기관 사전협의 필수'}</span></div>`;
  if (cls === 'no')   detailWarn = `<div class="detail-row"><span class="detail-label">사유</span><span class="detail-val no-txt">${item.basis}</span></div>`;

  return `<div class="card ${cls}" onclick="toggleCard(this)">
  <div class="card-head">
    <span class="badge ${cls}">${lbl}</span>
    <span class="card-code">${item.code}</span>
    <span class="card-name">${nameHl}</span>
    <span class="card-type">${item.type}</span>
    <span class="expand-icon">▼</span>
  </div>
  <div class="card-detail">
    <div class="detail-row"><span class="detail-label">중분류</span><span class="detail-val">${midHl} (${item.mid})</span></div>
    <div class="detail-row"><span class="detail-label">근거</span><span class="detail-val">${item.basis || '-'}</span></div>
    ${detailWarn}
  </div>
</div>`;
}

function render(items, q) {
  const list = document.getElementById('results-list');
  if (items.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>검색 결과가 없어요</h3><p>"${q}"에 해당하는 업종을 찾을 수 없습니다.<br>코드 5자리 또는 업종명 일부를 다시 입력해보세요.</p></div>`;
    return;
  }

  // 중분류별 그룹화
  const groups = {};
  items.forEach(item => {
    const key = `${item.mid}|${item.midNm}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  let html = '';
  Object.entries(groups).forEach(([key, grpItems]) => {
    const [mid, midNm] = key.split('|');
    html += `<div class="mid-divider">${midNm} (${mid}) · ${grpItems.length}개</div>`;
    grpItems.forEach(item => { html += renderCard(item, q); });
  });
  list.innerHTML = html;
}

function updateStats(query) {
  ['ok','warn','no','all'].forEach(f => {
    const items = getFiltered(query, f === 'all' ? 'all' : f);
    // 필터별 카운트
    const all = getFiltered(query, 'all');
    document.getElementById('cnt-all').textContent  = all.length;
    document.getElementById('cnt-ok').textContent   = getFiltered(query, 'ok').length;
    document.getElementById('cnt-warn').textContent = getFiltered(query, 'warn').length;
    document.getElementById('cnt-no').textContent   = getFiltered(query, 'no').length;
  });
}

function doSearch() {
  const q = document.getElementById('q').value;
  currentQuery = q;
  currentResults = getFiltered(q, currentFilter);

  updateStats(q);
  document.getElementById('result-count').textContent = currentResults.length;
  document.getElementById('results-header').innerHTML =
    `${q ? `"<strong>${q}</strong>" 검색 결과 ` : '전체 '}<span class="result-count" id="result-count">${currentResults.length}</span>개 업종`;

  render(currentResults, q);
}

function filterStatus(f) {
  currentFilter = f;
  ['all','ok','warn','no'].forEach(x => {
    document.getElementById('pill-'+x).classList.toggle('active', x === f);
  });
  currentResults = getFiltered(currentQuery, f);
  document.getElementById('results-header').innerHTML =
    `${currentQuery ? `"<strong>${currentQuery}</strong>" ` : ''}검색 결과 <span class="result-count">${currentResults.length}</span>개 업종`;
  render(currentResults, currentQuery);
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

// 엔터키
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});


function selectDangi(id, btn) {
  // 선택 상태 업데이트
  document.querySelectorAll('.danji-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // 검색 섹션 표시
  const sec = document.getElementById('search-section');
  sec.style.display = 'block';
  sec.style.opacity = '0';
  sec.style.transform = 'translateY(8px)';
  setTimeout(() => {
    sec.style.transition = 'opacity 0.25s, transform 0.25s';
    sec.style.opacity = '1';
    sec.style.transform = 'translateY(0)';
  }, 10);

  // 통계/결과도 표시
  document.querySelector('.stats-bar').style.display = 'flex';
  document.querySelector('.results-wrap').style.display = 'block';

  // 검색창 힌트 업데이트 + 포커스
  const danjiNames = { namdong: '남동국가산업단지' };
  document.getElementById('q').placeholder = `예) 26110  또는  전자부품  또는  기계장비`;
  document.getElementById('q').focus();

  // 초기 렌더
  doSearch();
}

// 초기 렌더 — 산단 선택 전엔 숨김
// doSearch() 는 selectDangi에서 호출
